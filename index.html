<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajedrez Pro - Master Edition</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="start-screen" class="screen active">
        <h1 class="main-title">AJEDREZ PRO</h1>
        <p class="subtitle">Elige tu oponente</p>
        <div class="character-container">
            <div onclick="selectCharacter('agnes')" class="char-card">
                <div class="icon">👑</div>
                <h2>Agnes</h2>
                <p>La Estratega</p>
            </div>
            <div onclick="selectCharacter('rick')" class="char-card">
                <div class="icon">🤠</div>
                <h2>Rick</h2>
                <p>El Casual</p>
            </div>
        </div>
    </div>

    <div id="difficulty-screen" class="screen">
        <h2 id="diff-title"></h2>
        <div id="diff-buttons" class="button-grid"></div>
        <button class="btn-secondary" onclick="goBack()">← Volver</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-info">
            <span id="status">Tu turno</span>
        </div>
        <div id="board"></div>
        <div class="controls">
            <button class="btn-danger" onclick="resetGame()">Reiniciar</button>
        </div>
    </div>

    <script src="js/chess-engine.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
